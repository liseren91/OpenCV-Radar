name: Update jobs pool

on:
  schedule:
    # Daily at 05:17 UTC (odd minute to avoid the top-of-hour cron rush).
    - cron: '17 5 * * *'
  workflow_dispatch: {} # manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-jobs
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch jobs from all sources
        env:
          # Optional — without these the Adzuna adapter is skipped gracefully.
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          # Optional overrides:
          # JOB_QUERIES: 'product manager,AI engineer'
          # JOB_FRESH_DAYS: '14'
        run: node scripts/fetch-jobs.mjs

      - name: Commit updated jobs.json
        run: |
          git config user.name "job-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/jobs.json
          if git diff --cached --quiet; then
            echo "No changes in jobs.json — nothing to commit."
          else
            git commit -m "chore: daily jobs.json update ($(date -u +%Y-%m-%d))"
            git push
          fi
